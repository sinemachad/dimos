name: tests

on:
 workflow_call:
   inputs:
     dev-image:
       required: true
       type: string
       default: "dev:dev"
     cmd:
       required: true
       type: string

permissions:
  contents: read
  packages: read

jobs:
  run-tests:
    runs-on: [self-hosted, Linux]
    container:
      image: ghcr.io/dimensionalos/${{ inputs.dev-image }}
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix permissions
        run: |
          git config --global --add safe.directory '*'

      - name: Install Python dependencies
        run: uv sync --all-extras --no-extra dds --frozen

      - name: Remove pydrake stubs
        run: |
          find .venv/lib/*/site-packages/pydrake -name '*.pyi' -delete 2>/dev/null || true

      - name: Run tests
        run: |
          /entrypoint.sh bash -c "source .venv/bin/activate && ${{ inputs.cmd }}"

      - name: check disk space
        if: failure()
        run: |
          df -h
